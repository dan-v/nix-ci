name: CI
on:
  pull_request:
  push:
    branches: [main]

jobs:
  # Fast checks: no Postgres needed.
  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: cargo fmt
        working-directory: rust
        run: cargo fmt --all -- --check
      - name: cargo clippy
        working-directory: rust
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  unit-tests:
    name: unit tests (no DB)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: unit tests
        working-directory: rust
        run: cargo test --workspace --lib --bins

  # Integration tests: require Postgres.
  integration-tests:
    name: integration tests (Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nix_ci_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/nix_ci_test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: integration tests
        working-directory: rust
        run: cargo test -p nix-ci-core --tests

  nix-flake-check:
    name: nix flake check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/determinate-nix-action@v3
        with:
          flakehub: false
      - run: nix flake check --print-build-logs

  load-tests:
    # Feature-gated production-scale fan-in DAG load test. Runs behind
    # the `load-test` cargo feature so it only fires in CI (or when a
    # developer explicitly opts in locally).
    name: load tests (nixpkgs-scale)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nix_ci_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/nix_ci_test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: load tests
        working-directory: rust
        run: cargo test -p nix-ci-core --features load-test --test load --release -- --nocapture
